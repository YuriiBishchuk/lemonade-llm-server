services:
  openclaw:
    build: 
      context: ./openclaw
      dockerfile: Dockerfile
    container_name: openclaw
    restart: always
    ports:
      - "3000:3000" # Web UI
    networks:
      - proxy-network
    environment:
      # === LLM CONFIGURATION ===
      - OPENCLAW_API_BASE_URL=http://lemonade:13305/v1
      - OPENCLAW_MODEL=${OPENCLAW_MODEL:-user.gemma-4-E2B-it-GGUF-Q4_K_M}
      - OPENCLAW_API_KEY=${OPENCLAW_API_KEY:-lemonade-local}
      
      # === VECTOR STORE (Qdrant) ===
      - OPENCLAW_VECTOR_STORE=qdrant
      - OPENCLAW_QDRANT_URL=http://qdrant:6333
      
      # === WEB SEARCH (SearXNG - Free & Private) ===
      - OPENCLAW_SEARCH_ENGINE=searxng
      - OPENCLAW_SEARXNG_URL=http://searxng:8080
      
      # === TELEGRAM NOTIFICATIONS ===
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - OPENCLAW_ENABLE_TELEGRAM=true
      
      # === WORKSPACE ===
      - OPENCLAW_WORKSPACE_DIR=/opt/openclaw/workspace
      
      # === SANDBOX / SECURITY ===
      - OPENCLAW_ENABLE_SANDBOX=true

    volumes:
      - ./config:/root/.openclaw:Z
      - ./workspace:/opt/openclaw/workspace:Z
      # - /var/run/docker.sock:/var/run/docker.sock:z

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: always
    ports:
      - "6333:6333"
    networks:
      - proxy-network
    volumes:
      - ./qdrant_data:/qdrant/storage:Z

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: always
    ports:
      - "8081:8080" # Web UI (Internal 8080)
    networks:
      - proxy-network
    volumes:
      - ./openclaw/searxng:/etc/searxng:Z
    environment:
      - SEARXNG_BASE_URL=http://localhost:8081

networks:
  proxy-network:
    external: true
