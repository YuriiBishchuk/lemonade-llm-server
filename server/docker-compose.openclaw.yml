services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:2024.12.1
    container_name: openclaw
    user: root
    restart: always
    ports:
      - "3000:18789" # Web UI
    networks:
      - proxy-network
    environment:
      # === LLM CONFIGURATION ===
      - OPENCLAW_API_BASE_URL=http://lemonade:13305/v1
      - OPENCLAW_MODEL=${OPENCLAW_MODEL:-user.gemma-4-E2B-it-GGUF-Q4_K_M}
      - OPENCLAW_API_KEY=${OPENCLAW_API_KEY:-lemonade-local}

      # === VECTOR STORE (Qdrant) ===
      - OPENCLAW_VECTOR_STORE=qdrant
      - OPENCLAW_QDRANT_URL=http://qdrant:6333

      # === WEB SEARCH (SearXNG - Free & Private) ===
      - OPENCLAW_SEARCH_ENGINE=searxng
      - OPENCLAW_SEARXNG_URL=http://searxng:8080

      # === TELEGRAM NOTIFICATIONS ===
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - OPENCLAW_ENABLE_TELEGRAM=true

      # === WORKSPACE ===
      - OPENCLAW_WORKSPACE_DIR=/opt/openclaw/workspace

      # === SANDBOX / SECURITY ===
      - OPENCLAW_GATEWAY_AUTH_MODE=token
      - OPENCLAW_GATEWAY_AUTH_TOKEN=${OPENCLAW_TOKEN:-lemonade-token}
      - OPENCLAW_GATEWAY_AUTH_DEVICE_PAIRING_ENABLED=true
      - OPENCLAW_GATEWAY_AUTH_AUTHORIZED_DEVICES=["812169f2-0ee3-4502-8e13-cf4bdb2e2643"]
      - OPENCLAW_GATEWAY_AUTH_AUTHORIZEDDEVICES=["812169f2-0ee3-4502-8e13-cf4bdb2e2643"]
      - OPENCLAW_GATEWAY_CONTROL_UI_ALLOWED_ORIGINS=*
      - OPENCLAW_GATEWAY_HOST=0.0.0.0
      - OPENCLAW_GATEWAY_PUBLIC_URL=http://192.168.0.11:3000

    volumes:
      - ./config:/root/.openclaw:z
      - ./workspace:/opt/openclaw/workspace:z
      # - /var/run/docker.sock:/var/run/docker.sock:z

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: always
    ports:
      - "6333:6333"
    networks:
      - proxy-network
    volumes:
      - ./qdrant_data:/qdrant/storage:z

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: always
    ports:
      - "8081:8080" # Web UI (Internal 8080)
    networks:
      - proxy-network
    volumes:
      - ./openclaw/searxng:/etc/searxng:z
    environment:
      - SEARXNG_BASE_URL=http://localhost:8081

networks:
  proxy-network:
    external: true
