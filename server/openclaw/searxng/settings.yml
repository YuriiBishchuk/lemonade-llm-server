use_default_settings: true
server:
  secret_key: "lemonade_search_secret_key_change_me" # Minimal requirement
  bind_address: "0.0.0.0"
  port: 8080
search:
  safe_search: 1 # Safe search enabled
  autocomplete: "duckduckgo"
engines:
  - name: google
    engine: google
    shortcut: g
  - name: bing
    engine: bing
    shortcut: b
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
