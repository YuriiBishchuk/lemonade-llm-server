services:
  lemonade:
    build: .
    container_name: lemonade
    restart: always
    ports:
      - "13305:13305"
    networks:
      - proxy-network
    extra_hosts:
      - "host.containers.internal:host-gateway"
    devices:
      # KFD is required for ROCm compute
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    # Security options to allow device access in rootless podman
    security_opt:
      - label=disable
    environment:
      # === ROCm HACK (Vega 11 / gfx902) ===
      # Emulate gfx900 (Vega 10/64) to bypass "unsupported" check
      - HSA_OVERRIDE_GFX_VERSION=9.0.0
      # Disable SDMA to prevent crashes on some APUs
      - HSA_ENABLE_SDMA=0
      # Force Lemonade to use the system llama-server built with ROCm
      - LEMONADE_BACKEND=system
      
    ulimits:
      memlock:
        soft: -1
        hard: -1
      stack:
        soft: -1
        hard: -1

    volumes:
      - ./lemonade-cache:/root/.cache/lemonade:Z
      - ./huggingface-cache:/root/.cache/huggingface:Z
      - ./llama-data:/opt/lemonade/llama:Z

networks:
  proxy-network:
    external: true
