services:
  lemonade-nvidia:
    build: .
    container_name: lemonade-nvidia
    restart: always
    ports:
      - "13306:13305"

    # Required for NVIDIA device access in rootless Podman on Fedora/Bazzite.
    security_opt:
      - label=disable

    environment:
      # === BACKEND ===
      - LEMONADE_BACKEND=system
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

    ulimits:
      memlock:
        soft: -1
        hard: -1
      stack:
        soft: -1
        hard: -1

    # CDI passthrough — uses /etc/cdi/nvidia.yaml (already present on Bazzite).
    # This exposes the actual NVIDIA GPU and CUDA libraries to the container.
    devices:
      - nvidia.com/gpu=all

    volumes:
      - ./lemonade-cache:/root/.cache/lemonade:Z
      - ./huggingface-cache:/root/.cache/huggingface:Z
      - ./llama-data:/opt/lemonade/llama:Z
