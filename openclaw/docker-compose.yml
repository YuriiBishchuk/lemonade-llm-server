services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: always
    ports:
      - "3000:3000" # Web UI
    networks:
      - proxy-network
    environment:
      # === LLM CONFIGURATION ===
      - OPENCLAW_API_BASE_URL=http://lemonade:13305/v1
      - OPENCLAW_MODEL=user.gemma-4-E2B-it-GGUF-Q4_K_M
      - OPENCLAW_API_KEY=lemonade-local
      
      # === VECTOR STORE (Qdrant) ===
      - OPENCLAW_VECTOR_STORE=qdrant
      - OPENCLAW_QDRANT_URL=http://qdrant:6333
      
      # === WORKSPACE ===
      - OPENCLAW_WORKSPACE_DIR=/opt/openclaw/workspace
      
      # === SANDBOX / SECURITY ===
      - OPENCLAW_ENABLE_SANDBOX=true

    volumes:
      - ./config:/root/.openclaw:Z
      - ./workspace:/opt/openclaw/workspace:Z
      - /var/run/docker.sock:/var/run/docker.sock:z

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: always
    ports:
      - "6333:6333"
    networks:
      - proxy-network
    volumes:
      - ./qdrant_data:/qdrant/storage:Z

networks:
  proxy-network:
    external: true
