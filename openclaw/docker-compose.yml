services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: always
    ports:
      - "3000:3000" # Web UI
    networks:
      - proxy-network
    environment:
      # === LLM CONFIGURATION (Connecting to your Lemonade Server) ===
      - OPENCLAW_API_BASE_URL=http://lemonade:13305/v1
      - OPENCLAW_MODEL=user.gemma-4-E2B-it-GGUF-Q4_K_M
      - OPENCLAW_API_KEY=lemonade-local # Lemonade doesn't require keys, but some agents do
      
      # === WORKSPACE ===
      - OPENCLAW_WORKSPACE_DIR=/opt/openclaw/workspace
      
      # === SANDBOX / SECURITY ===
      # OpenClaw can execute commands. Ensure it runs in a restricted environment.
      - OPENCLAW_ENABLE_SANDBOX=true

    volumes:
      - ./config:/root/.openclaw:Z
      - ./workspace:/opt/openclaw/workspace:Z
      # Mounting docker socket allows OpenClaw to spawn its own sandbox containers if needed
      - /var/run/docker.sock:/var/run/docker.sock:z

networks:
  proxy-network:
    external: true
